services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8788:8788"
    volumes:
      - wrangler-state:/app/.wrangler/state
    environment:
      - AGENT_URL=http://agent:8787
      - INTERNAL_API_KEY=eigen-local-dev-key

  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - packages/agent/.env
    environment:
      - PORT=8787
      - PROJECTS_DIR=/tmp/eigen-projects
      - API_URL=http://api:8788

volumes:
  wrangler-state:
