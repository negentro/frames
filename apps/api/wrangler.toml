name = "frames-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]


[[r2_buckets]]
binding = "ASSETS"
bucket_name = "eigen-assets"
preview_bucket_name = "eigen-assets-preview"

[[d1_databases]]
binding = "DB"
database_name = "eigen-db"
database_id = "local"

# [containers]
# binding = "AGENT"
# image = "./packages/agent"

[vars]
AGENT_URL = "http://localhost:8787"
INTERNAL_API_KEY = "eigen-local-dev-key"
